on:
  push:
    branches:
      - "main"
  pull_request:
  schedule:
    - cron: '24 10 * * 4'

name: "CI"

permissions:
  contents: read
  actions: read
  security-events: write

jobs:
  ci:
    uses: "WebProject-xyz/.github/.github/workflows/ci.yml@main"
    secrets: inherit
    with:
      php-version: "8.4"
      php-version-next: "8.5"
      php-version-future: "8.6"
      with-coverage: true
      coverage-path: "build/logs/"
      with-codacy: true
      with-codecov: true
