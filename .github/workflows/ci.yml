on:
  push:
    branches:
      - "main"
  pull_request:
  schedule:
    - cron: '24 10 * * 4'

name: "CI"

permissions:
  contents: read
  actions: read
  security-events: write

jobs:
  ci:
    uses: "WebProject-xyz/.github/.github/workflows/ci.yml@62db3a110fb7a4e6d433d5bb1fef18cf95bf4c5a" # main
    secrets: inherit
    with:
      php-version: "8.4"
      coverage-path: "build/logs/"
      with-codacy: true
      with-codecov: true
      test-matrix: |
        [
          {"php-version": "8.4", "dependencies": "locked",  "with_coverage": true},
          {"php-version": "8.5", "dependencies": "highest", "with_coverage": false}
        ]
