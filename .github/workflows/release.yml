name: Release
on:
  workflow_run:
    workflows: ["CI", "Codacy Security Scan"]
    types:
      - completed
    branches:
      - main

permissions:
  actions: read
  contents: read

jobs:
  gate:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    name: gate
    runs-on: ubuntu-latest
    outputs:
      ready: ${{ steps.check.outputs.ready }}
    steps:
      - name: Verify required workflows succeeded
        id: check
        uses: actions/github-script@v7
        with:
          script: |
            const required = ['CI', 'Codacy Security Scan'];
            const sha = context.payload.workflow_run.head_sha;
            const branch = context.payload.workflow_run.head_branch;
            const { owner, repo } = context.repo;

            const runs = await github.paginate(github.rest.actions.listWorkflowRunsForRepo, {
              owner,
              repo,
              head_sha: sha,
              per_page: 100,
            });

            const latestByName = new Map();
            for (const run of runs) {
              if (!required.includes(run.name)) {
                continue;
              }
              if (run.head_branch !== branch) {
                continue;
              }

              const known = latestByName.get(run.name);
              if (!known || new Date(run.created_at) > new Date(known.created_at)) {
                latestByName.set(run.name, run);
              }
            }

            const missing = [];
            const failing = [];

            for (const workflowName of required) {
              const run = latestByName.get(workflowName);

              if (!run || run.status !== 'completed') {
                missing.push(workflowName);
                continue;
              }

              if (run.conclusion !== 'success') {
                failing.push(`${workflowName}=${run.conclusion}`);
              }
            }

            const ready = missing.length === 0 && failing.length === 0;
            core.setOutput('ready', ready ? 'true' : 'false');

            core.info(`head_sha=${sha}, branch=${branch}`);
            core.info(`missing=[${missing.join(', ')}], failing=[${failing.join(', ')}]`);

            if (!ready) {
              core.notice('Skipping release: both workflows must be completed with success for this commit.');
            }

  release:
    needs: [gate]
    if: ${{ needs.gate.outputs.ready == 'true' }}
    name: release
    runs-on: ubuntu-latest
    steps:
      - name: Generate Token
        id: generate_token
        uses: actions/create-github-app-token@29824e69f54612133e76f7eaac726eef6c875baf # v2
        with:
          app-id: ${{ secrets.BOT_APP_ID }}
          private-key: ${{ secrets.BOT_APP_PRIVATE_KEY }}

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
          token: ${{ steps.generate_token.outputs.token }}

      - name: Semantic Release
        uses: cycjimmy/semantic-release-action@v4
        with:
          tag_format: ${version}
          branches: |
            ['main']
          extra_plugins: |
            @semantic-release/commit-analyzer
            @semantic-release/release-notes-generator
            @semantic-release/github
            @semantic-release/changelog
            @semantic-release/git
            conventional-changelog-conventionalcommits
        env:
          GITHUB_TOKEN: ${{ steps.generate_token.outputs.token }}
